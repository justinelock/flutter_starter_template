name: Flutter CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v3
        with:
          channel: stable
      - run: flutter pub get
      - run: dart format --set-exit-if-changed lib test
      - run: flutter analyze
      - run: flutter test
      - run: flutter build web --dart-define=APP_ENV=prod
