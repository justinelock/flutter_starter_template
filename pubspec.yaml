name: flutter_starter_template
description: Production-ready Flutter starter template with Riverpod 3, go_router, dio, Material 3, and liquid glass UI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  go_router: ^17.3.0
  dio: ^5.10.0
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.3.1
  logger: ^2.7.0
  package_info_plus: ^10.2.0
  url_launcher: ^6.3.2
  connectivity_plus: ^7.2.0
  intl: ^0.20.2
  liquid_glass_widgets: ^0.19.5
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.4
  build_runner: ^2.15.0
  mocktail: ^1.0.5
  shared_preferences_platform_interface: ^2.4.2

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/svgs/
